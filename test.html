<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOG Live Test</title>
    <style>
        body {
            margin: 0;
            font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
            background: #111;
            color: #ddd;
        }

        .toolbar {
            display: flex;
            gap: 8px;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #333;
            position: sticky;
            top: 0;
            background: #111;
            z-index: 10;
        }

        .toolbar button,
        .toolbar a {
            background: #222;
            color: #ddd;
            border: 1px solid #444;
            border-radius: 6px;
            padding: 8px 10px;
            cursor: pointer;
            text-decoration: none;
            font-size: 14px;
        }

        .toolbar button:hover,
        .toolbar a:hover {
            background: #2b2b2b;
        }

        .hint {
            margin-left: auto;
            color: #999;
            font-size: 13px;
        }

        iframe {
            width: 100%;
            height: calc(100vh - 54px);
            border: 0;
            display: block;
            background: #000;
        }
    </style>
</head>
<body>
    <div class="toolbar">
        <button id="reloadFrameBtn">Reload Game Frame</button>
        <button id="resetSaveBtn">Reset Save + Reload</button>
        <a href="./index.html" target="_blank" rel="noopener noreferrer">Open index.html in New Tab</a>
        <span class="hint">Use this page for quick live validation in Codespaces.</span>
    </div>

    <iframe id="gameFrame" src="./index.html" title="FOG game test frame"></iframe>

    <script>
        const gameFrame = document.getElementById('gameFrame');
        const reloadFrameBtn = document.getElementById('reloadFrameBtn');
        const resetSaveBtn = document.getElementById('resetSaveBtn');

        reloadFrameBtn.addEventListener('click', () => {
            gameFrame.src = './index.html';
        });

        resetSaveBtn.addEventListener('click', () => {
            localStorage.removeItem('fogGameSave');
            localStorage.removeItem('fogSave');
            localStorage.removeItem('fog-save');
            localStorage.removeItem('FOG_SAVE');
            gameFrame.src = './index.html';
        });
    </script>
</body>
</html>
